backend:
  name: github
  repo: jakefixestech/meredith-lewis-photography
  branch: main
  base_url: https://meredithlewisphotography.com
  auth_endpoint: /api/auth

media_folder: "src/assets/uploads"
public_folder: "/src/assets/uploads"

collections:
  - name: "homepage"
    label: "Home Page"
    files:
      - name: "content"
        label: "Home Page Content"
        file: "src/content/homepage.json"
        editor:
          preview: false
        fields:
          # ---------- HERO ----------
          - { name: "hero_image", label: "Hero Image (top banner)", widget: "image" }
          - { name: "hero_image_alt", label: "Hero Image — description for screen readers", widget: "string" }
          - { name: "hero_heading", label: "Hero Heading", widget: "text" }

          # ---------- ABOUT / WELCOME ----------
          - { name: "about_eyebrow", label: "About — small text above heading", widget: "string" }
          - { name: "about_heading", label: "About — Heading", widget: "string" }
          - { name: "about_photo", label: "About — Your Photo", widget: "image" }
          - { name: "about_photo_alt", label: "About Photo — description for screen readers", widget: "string" }
          - name: "about_paragraphs"
            label: "About — Paragraphs"
            widget: "list"
            field: { name: "text", label: "Paragraph", widget: "text" }

          # ---------- PORTFOLIO ----------
          - { name: "portfolio_eyebrow", label: "Portfolio — small text above heading", widget: "string" }
          - { name: "portfolio_heading", label: "Portfolio — Heading", widget: "string" }
          - { name: "portfolio_blurb", label: "Portfolio — Short Description", widget: "text" }
          - name: "galleries"
            label: "Gallery Tiles"
            widget: "list"
            fields:
              - { name: "title", label: "Title", widget: "string" }
              - { name: "img", label: "Image", widget: "image" }
              - { name: "alt", label: "Image description (for screen readers)", widget: "string" }
              - { name: "href", widget: "hidden" }
              - { name: "span", widget: "hidden" }
              - { name: "ratio", widget: "hidden" }

          # ---------- SERVICES & PRICING ----------
          - { name: "services_eyebrow", label: "Services — small text above heading", widget: "string" }
          - { name: "services_heading", label: "Services — Heading", widget: "string" }
          - { name: "services_blurb", label: "Services — Short Description", widget: "text" }
          - name: "services"
            label: "Services & Pricing List"
            widget: "list"
            fields:
              - { name: "name", label: "Service Name", widget: "string" }
              - { name: "price", label: "Price", widget: "string" }
          - { name: "services_footnote", label: "Services — Footnote", widget: "text" }

          # ---------- PAY WHAT YOU CAN ----------
          - { name: "minis_eyebrow", label: "Mini Sessions — small text above heading", widget: "string" }
          - { name: "minis_heading", label: "Mini Sessions — Heading", widget: "string" }
          - { name: "minis_body_before", label: "Mini Sessions — Text (before the quoted phrase)", widget: "text" }
          - { name: "minis_body_emphasis", label: "Mini Sessions — Highlighted Phrase", widget: "string" }
          - { name: "minis_body_after", label: "Mini Sessions — Text (after the quoted phrase)", widget: "text" }
          - { name: "minis_button_label", widget: "hidden" }
          - { name: "minis_button_href", widget: "hidden" }

          # ---------- TESTIMONIALS ----------
          - { name: "testimonials_eyebrow", label: "Testimonials — small text above heading", widget: "string" }
          - { name: "testimonials_heading", label: "Testimonials — Heading", widget: "string" }
          - name: "testimonials"
            label: "Testimonials (reviews)"
            widget: "list"
            fields:
              - { name: "quote", label: "Review Text", widget: "text" }
              - { name: "author", label: "Reviewer Name", widget: "string" }
          - { name: "testimonials_link_label", widget: "hidden" }
          - { name: "testimonials_link_href", widget: "hidden" }

          # ---------- CLOSING CTA ----------
          - { name: "cta_image", label: "Closing — Background Image", widget: "image" }
          - { name: "cta_image_alt", label: "Closing Image — description for screen readers", widget: "string" }
          - { name: "cta_heading", label: "Closing — Heading", widget: "string" }
          - { name: "cta_text", label: "Closing — Text", widget: "text" }
          - { name: "cta_button_label", widget: "hidden" }
          - { name: "cta_button_href", widget: "hidden" }

  - name: "services"
    label: "Services & Pricing Page"
    files:
      - name: "content"
        label: "Services & Pricing Content"
        file: "src/content/services.json"
        editor:
          preview: false
        fields:
          # ---------- HEADER ----------
          - { name: "header_eyebrow", label: "Header — small text above title", widget: "string" }
          - { name: "header_heading", label: "Header — Page Title", widget: "string" }
          - { name: "header_intro", label: "Header — Intro Paragraph", widget: "text" }
          - { name: "header_subnote", label: "Header — Note (what every session includes)", widget: "text" }

          # ---------- SERVICE CARDS ----------
          - name: "services"
            label: "Services (each card)"
            widget: "list"
            fields:
              - { name: "name", label: "Service Name", widget: "string" }
              - { name: "price", label: "Price", widget: "string" }
              - { name: "image", label: "Photo", widget: "image" }
              - { name: "alt", label: "Photo description (for screen readers)", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }
              - { name: "link", widget: "hidden", required: false }

          # ---------- ADD ONS / ADDITIONAL PHOTOS ----------
          - { name: "addons_bg", label: "Add Ons — Background Photo", widget: "image" }
          - { name: "addons_bg_alt", label: "Add Ons Background — description for screen readers", widget: "string" }
          - { name: "addons_eyebrow", label: "Add Ons — small text above title", widget: "string" }
          - { name: "addons_heading", label: "Add Ons — Section Title", widget: "string" }
          - name: "addons"
            label: "Additional Photos (the three boxes)"
            widget: "list"
            fields:
              - { name: "title", label: "Box Title", widget: "string" }
              - { name: "body", label: "Box Text", widget: "text" }

  - name: "testimonials_page"
    label: "Testimonials Page"
    files:
      - name: "content"
        label: "Testimonials Content"
        file: "src/content/testimonials.json"
        editor:
          preview: false
        fields:
          - { name: "header_eyebrow", label: "Header — small text above title", widget: "string" }
          - { name: "header_heading", label: "Header — Page Title", widget: "string" }
          - { name: "header_intro", label: "Header — Intro Line", widget: "text" }
          - name: "testimonials"
            label: "Testimonials (reviews)"
            widget: "list"
            fields:
              - { name: "author", label: "Reviewer Name", widget: "string" }
              - { name: "quote", label: "Review Text", widget: "text" }

  - name: "contact_page"
    label: "Contact Page"
    files:
      - name: "content"
        label: "Contact Content"
        file: "src/content/contact.json"
        editor:
          preview: false
        fields:
          - { name: "header_eyebrow", label: "Header — small text above title", widget: "string" }
          - { name: "header_heading", label: "Header — Page Title", widget: "string" }
          - { name: "header_intro", label: "Header — Intro Paragraph", widget: "text" }
          - { name: "info_heading", label: "Contact Info — Heading", widget: "string" }
          - { name: "booking_text", label: "Booking — Text above the Book button", widget: "text" }

  - name: "portfolio_page"
    label: "Portfolio Main Page"
    files:
      - name: "content"
        label: "Portfolio Overview Content"
        file: "src/content/portfolio.json"
        editor:
          preview: false
        fields:
          - { name: "header_eyebrow", label: "Header — small text above title", widget: "string" }
          - { name: "header_heading", label: "Header — Page Title", widget: "string" }
          - { name: "header_intro", label: "Header — Intro Paragraph", widget: "text" }
          - name: "sections"
            label: "Portfolio Row Sections"
            widget: "list"
            fields:
              - { name: "title", label: "Collection Title (e.g. Couples)", widget: "string" }
              - { name: "description", label: "Short Blurb description", widget: "text" }
              - { name: "image", label: "Featured Section Photo", widget: "image" }
              - { name: "href", label: "Page URL Path (e.g. /couples)", widget: "string" }

  - name: "portfolio_senior_portraits"
    label: "Portfolio - Senior Portraits"
    files:
      - name: "content"
        label: "Senior Portraits Content"
        file: "src/content/portfolio-senior-portraits.json"
        editor:
          preview: false
        fields:
          - { name: "header_eyebrow", label: "Header — small text above title", widget: "string" }
          - { name: "header_heading", label: "Header — Page Title", widget: "string" }
          - { name: "header_intro", label: "Header — Intro Paragraph", widget: "text" }
          - { name: "cta_text", label: "CTA Box Text", widget: "string" }
          - name: "gallery"
            label: "Photo Gallery"
            widget: "list"
            fields:
              - { name: "title", label: "Photo Label Description (e.g. Photo 1)", widget: "string" }
              - { name: "image", label: "Photo Asset", widget: "image" }