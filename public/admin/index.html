<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Meredith Lewis Photography — Studio Manager</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <style>
      /* --- Global App Polish --- */
      body, html, #nc-root {
        background-color: #fafaf9 !important; 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
      }
      
      /* Top App Header Bar Styling */
      #nc-root div[class*="AppHeader-appHeaderBg"] {
        background-color: #1c1917 !important; 
        border-bottom: 1px solid #2e2a24 !important;
      }
      
      /* App Header Brand Text Logo */
      #nc-root div[class*="AppHeader-logo"] {
        font-family: Garamond, Baskerville, "Baskerville Old Face", "Hoefler Text", "Times New Roman", serif !important;
        font-weight: 400 !important;
        letter-spacing: 0.1em !important;
        color: #f5f5f4 !important;
        text-transform: uppercase !important;
        font-size: 14px !important;
      }
      
      /* --- Sidebar Menu Container & Typography --- */
      #nc-root div[class*="Sidebar-sidebarContainer"] {
        background-color: #fafaf9 !important;
        border-right: 1px solid #e7e5e4 !important;
        padding-top: 24px !important;
      }

      #nc-root h2[class*="Sidebar-sidebarHeading"] {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
        text-transform: uppercase !important;
        letter-spacing: 0.12em !important;
        font-size: 11px !important;
        color: #78716c !important; 
        font-weight: 600 !important;
        margin-bottom: 12px !important;
      }

      /* Sidebar Navigation Link Elements */
      #nc-root a[class*="Sidebar-sidebarNavLink"] {
        font-size: 13px !important;
        font-weight: 400 !important;
        color: #44403c !important; 
        letter-spacing: 0.01em !important;
        border-radius: 4px !important;
        padding: 8px 12px !important;
        transition: all 0.2s ease !important;
      }

      /* Active Link Highlighter */
      #nc-root a[class*="Sidebar-sidebarNavLink-active"] {
        background-color: #f5f5f4 !important; 
        color: #1c1917 !important;
        font-weight: 500 !important;
        border-left: 3px solid #78716c !important;
      }

      /* --- Main View Elements --- */
      #nc-root h2 {
        font-family: Garamond, Baskerville, serif !important;
        font-weight: 400 !important;
        color: #1c1917 !important;
      }

      /* Clean Card Components */
      #nc-root div[class*="Card"] {
        border-radius: 4px !important;
        border: 1px solid #e7e5e4 !important;
        box-shadow: 0 1px 3px rgba(28, 25, 23, 0.02) !important;
        transition: transform 0.2s ease, box-shadow 0.2s ease !important;
      }
      
      #nc-root div[class*="Card"]:hover {
        box-shadow: 0 4px 12px rgba(28, 25, 23, 0.04) !important;
      }

      /* Interface Action Buttons styling */
      #nc-root button, 
      #nc-root a[class*="Button"] {
        border-radius: 4px !important;
        text-transform: uppercase !important;
        font-size: 11px !important;
        letter-spacing: 0.1em !important;
        font-weight: 500 !important;
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    
    <script>
      // Styles the interactive editing side preview layouts 
      CMS.registerPreviewStyle(`
        body { 
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
          padding: 40px; 
          color: #44403c; 
          background-color: #ffffff; 
          line-height: 1.6;
        } 
        h1 { 
          font-family: Garamond, Baskerville, "Times New Roman", serif; 
          font-size: 2.5rem; 
          color: #1c1917; 
          font-weight: 400;
          letter-spacing: -0.02em;
          margin-bottom: 10px;
        }
        span {
          text-transform: uppercase;
          font-size: 11px;
          letter-spacing: 0.2em;
          color: #a8a29e;
        }
        p {
          font-size: 15px;
          color: #57534e;
        }
      `);
    </script>
  </body>
</html>
