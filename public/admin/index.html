<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Meredith Lewis Photography — Studio Manager</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <style>
      /* --- Global App Polish --- */
      body, html, #nc-root {
        background-color: #fafaf9 !important; 
      }
      
      /* Target the Top Header Bar strictly via structural positioning */
      #nc-root div[class*="AppHeader"] {
        background-color: #1c1917 !important; 
        border-bottom: 1px solid #2e2a24 !important;
      }
      
      /* Force Header Text Logo formatting */
      #nc-root div[class*="AppHeader"] h1 {
        font-family: Garamond, Baskerville, serif !important;
        font-weight: 400 !important;
        letter-spacing: 0.08em !important;
        color: #f5f5f4 !important;
        text-transform: uppercase !important;
        font-size: 15px !important;
      }
      
      /* Target the navigation links container */
      #nc-root header + div div[class*="Sidebar"] {
        background-color: #fafaf9 !important;
        border-right: 1px solid #e7e5e4 !important;
      }

      /* Collection Title header text adjustments */
      #nc-root h2 {
        font-family: Garamond, Baskerville, serif !important;
        font-weight: 400 !important;
        color: #1c1917 !important;
      }

      /* Clean styling adjustments for core interface buttons */
      #nc-root button, 
      #nc-root a[class*="Button"] {
        border-radius: 2px !important;
        text-transform: uppercase !important;
        font-size: 11px !important;
        letter-spacing: 0.1em !important;
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    
    <script>
      CMS.registerPreviewStyle(`
        body { 
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
          padding: 40px; 
          color: #44403c; 
          background-color: #ffffff; 
          line-height: 1.6;
        } 
        h1 { 
          font-family: Garamond, Baskerville, "Times New Roman", serif; 
          font-size: 2.5rem; 
          color: #1c1917; 
          font-weight: 400;
          letter-spacing: -0.02em;
          margin-bottom: 10px;
        }
        span {
          text-transform: uppercase;
          font-size: 11px;
          letter-spacing: 0.2em;
          color: #a8a29e;
        }
        p {
          font-size: 15px;
          color: #57534e;
        }
      `);
    </script>
  </body>
</html>
