<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Meredith Lewis Photography — Studio Manager</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <style>
      /* --- Global Font & Aesthetic Polish --- */
      body {
        background-color: #fafaf9 !important; /* Tailwind stone-50 background vibe */
      }
      
      /* Target the Decap top header bar */
      #nc-root [class*="nc-AppHeader-appHeaderBg"] {
        background-color: #1c1917 !important; /* Elegant deep stone-900 black */
        border-bottom: 1px solid #2e2a24 !important;
      }
      
      /* Change Header Dashboard Text Logo to match her branding */
      #nc-root [class*="nc-AppHeader-logo"] {
        font-family: Garamond, Baskerville, "Baskerville Old Face", "Hoefler Text", "Times New Roman", serif !important;
        font-weight: 400 !important;
        letter-spacing: 0.08em !important;
        color: #f5f5f4 !important;
        text-transform: uppercase !important;
        font-size: 15px !important;
      }
      
      /* --- Sidebar Navigation Styling --- */
      #nc-root [class*="nc-Sidebar-sidebarContainer"] {
        background-color: #fafaf9 !important;
        border-right: 1px solid #e7e5e4 !important; /* stone-200 */
      }
      
      #nc-root [class*="nc-Sidebar-sidebarHeading"] {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
        text-transform: uppercase !important;
        letter-spacing: 0.12em !important;
        font-size: 11px !important;
        color: #78716c !important; /* stone-500 */
        font-weight: 600 !important;
      }

      #nc-root [class*="nc-Sidebar-sidebarNavLink"] {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
        font-size: 13px !important;
        font-weight: 400 !important;
        color: #44403c !important; /* stone-700 */
        letter-spacing: 0.01em !important;
        border-radius: 4px !important;
        margin-bottom: 2px !important;
        transition: all 0.2s ease;
      }

      /* Active sidebar link item highlighter */
      #nc-root [class*="nc-Sidebar-sidebarNavLink-active"] {
        background-color: #f5f5f4 !important; /* stone-100 */
        color: #1c1917 !important;
        font-weight: 500 !important;
        border-left: 3px solid #78716c !important;
      }

      /* --- Content & Editor Panel Polish --- */
      #nc-root [class*="nc-CollectionPage-sidebarHeading"] {
        font-family: Garamond, Baskerville, serif !important;
        font-size: 1.8rem !important;
        color: #1c1917 !important;
        font-weight: 400 !important;
      }

      /* Style edit interface buttons to look crisp and professional */
      #nc-root [class*="nc-Button-button"] {
        border-radius: 2px !important;
        text-transform: uppercase !important;
        font-size: 11px !important;
        font-weight: 500 !important;
        letter-spacing: 0.1em !important;
        box-shadow: none !important;
        transition: opacity 0.2s ease;
      }

      #nc-root [class*="nc-AppHeader-button-publish"] {
        background-color: #78716c !important; /* Soft premium brand accent gray */
        color: white !important;
      }

      #nc-root [class*="nc-AppHeader-button-publish"]:hover {
        background-color: #57534e !important;
      }

      /* --- Login Panel Branding Overrides --- */
      #nc-root [class*="Login-container"] {
        background-color: #fafaf9 !important;
      }

      #nc-root [class*="Login-card"] {
        border-radius: 4px !important;
        box-shadow: 0 4px 20px rgba(28, 25, 23, 0.05) !important;
        border: 1px solid #e7e5e4 !important;
      }

      #nc-root [class*="Login-logo"] {
        background-image: none !important; /* Strips standard icon */
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
      }

      #nc-root [class*="Login-logo"]::after {
        content: "Meredith Lewis Portfolio CMS" !important;
        font-family: Garamond, Baskerville, serif !important;
        font-size: 20px !important;
        letter-spacing: 0.05em !important;
        color: #1c1917 !important;
        text-transform: uppercase !important;
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    
    <script>
      // Automatically styles the visual side preview window layout for editing text fields 
      CMS.registerPreviewStyle(`
        body { 
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
          padding: 40px; 
          color: #44403c; 
          background-color: #ffffff; 
          line-height: 1.6;
        } 
        h1 { 
          font-family: Garamond, Baskerville, "Times New Roman", serif; 
          font-size: 2.5rem; 
          color: #1c1917; 
          font-weight: 400;
          letter-spacing: -0.02em;
          margin-bottom: 10px;
        }
        span {
          text-transform: uppercase;
          font-size: 11px;
          letter-spacing: 0.2em;
          color: #a8a29e;
        }
        p {
          font-size: 15px;
          color: #57534e;
          max-w-2xl;
        }
      `);
    </script>
  </body>
</html>
